<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="loader.css">
    <title>Loader in CSS</title>
</head>

<body>

    <!-- Loader in CSS  -->

    <h1>Loader</h1>

    <div class="container">

        <!-- Normal loader  -->
        <div class="wrapper">
            <div class="box">
                <p>Normal</p>
                <div class="loader"></div>
            </div>
        </div>

        <!-- Slow loader  -->
        <div class="wrapper">
            <div class="box">
                <p>Slow</p>
                <div class="loader slow"></div>
            </div>
        </div>

        <!-- Fast loader  -->
        <div class="wrapper">
            <div class="box">
                <p>Fast</p>
                <div class="loader fast"></div>
            </div>
        </div>

        <!-- Reverse loader  -->
        <div class="wrapper">
            <div class="box">
                <p>Reverse</p>
                <div class="loader reverse"></div>
            </div>
        </div>
    </div>




</body>

</html>
