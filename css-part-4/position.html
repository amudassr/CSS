<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position in CSS</title>
    <link rel="stylesheet" href="position.css">
</head>

<body>

    <!-- Positions in CSS  -->

    <!-- Fixed Navbar  -->

    <div class="navbar">
        Fixed Navbar
    </div>

    <br><br><br>

    <!-- Relative Example -->

    <h2>Relative Example</h2>

    <div class="box">Box 1</div>
    <div class="box1">Box 2</div>
    <div class="box">Box 3</div>


    <br><br><br>

    <!-- Absolute Example -->

    <h2>Absolute Example</h2>

    <div class="parent">
        <div class="child">
            Absolute
        </div>
    </div>

    <!-- Sticky Heading  -->

    <h2 class="sticky">Sticky Heading</h2>

    <p>Scroll down !!!</p>

    <p class="long"></p>

</body>

</html>
