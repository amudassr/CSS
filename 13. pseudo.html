<!DOCTYPE html>
<html lang="en">

<head>

    <title>Document</title>
    <link rel="stylesheet" href="pseudo.css">
</head>

<body>

    <!-- Active property -->

    <h3>Lorem ipsum dolor sit amet consectetur adipisicing elit. Architecto commodi id maiores consectetur beatae et
        velit eaque saepe repellendus suscipit!</h3>

    <button>edit</button>
    <button>delete</button>

    <br>

    <hr>

    <br>

    <!-- Checked Property  -->

    <input type="radio" id="yes" name="agreement">
    <label for="yes">Yes</label>

    <input type="radio" id="no" name="agreement">
    <label for="no">No</label>

    <hr>


    <!-- nth-of-type property  -->

    <h2>Vegetables:</h2>
    <ol>
        <li>Tomatoes</li>
        <br>
        <li>Cucumbers</li>
        <br>
        <li>Mushrooms</li>
        <br>
        <li>Potato</li>

        <h2>Fruits:</h2>


        <li>Apples</li>
        <br>
        <li>Mango</li>
        <br>
        <li>Pears</li>
        <br>
        <li>Oranges</li>

    </ol>
    </ul>




</body>

</html>
